  # ============================================================================
  # PART 7.5: AUTOMATIC REMEDIATION TRIGGERS
  # ============================================================================

  # 24. Automatic Remediation for S3 Public Access Violations
  RemediationRuleS3PublicRead:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${AWS::StackName}-remediate-s3-public-read"
      Description: Automatically remediate S3 buckets with public read access
      EventPattern:
        source:
          - aws.config
        detail-type:
          - Config Rules Compliance Change
        detail:
          configRuleName:
            - s3-bucket-public-read-prohibited
          newEvaluationResult:
            - NON_COMPLIANT
      State: ENABLED
      Targets:
        - Arn: !GetAtt RemediationEngine.Arn
          Id: RemediationS3PublicReadTarget
          InputTransformer:
            InputPathsMap:
              bucket: "$.detail.resourceId"
              rule: "$.detail.configRuleName"
              message: "$.detail.message"
            InputTemplate: |
              {
                "remediation_type": "block_s3_public_access",
                "resource_id": "<bucket>",
                "trigger": "<rule>",
                "resource_type": "s3_bucket",
                "finding_id": "<rule>-<bucket>",
                "finding_title": "S3 Bucket Public Read Access Detected",
                "finding_priority": "CRITICAL",
                "finding_description": "S3 bucket <bucket> has public read access - automatically blocking public access",
                "parameters": {}
              }

  RemediationRuleS3PublicWrite:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${AWS::StackName}-remediate-s3-public-write"
      Description: Automatically remediate S3 buckets with public write access
      EventPattern:
        source:
          - aws.config
        detail-type:
