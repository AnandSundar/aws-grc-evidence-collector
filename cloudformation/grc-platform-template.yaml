      Description: Checks whether RDS instances have Multi-AZ enabled
      Scope:
        ComplianceResourceTypes:
          - AWS::RDS::DBInstance
      Source:
        Owner: AWS
        SourceIdentifier: RDS_MULTI_AZ_SUPPORT

  ConfigRuleCloudTrailEnabled:
    Type: AWS::Config::ConfigRule
    DependsOn: ConfigRole
    Properties:
      ConfigRuleName: !Sub "${AWS::StackName}-cloudtrail-enabled"
      Description: Checks whether CloudTrail is enabled
      Source:
        Owner: AWS
        SourceIdentifier: CLOUD_TRAIL_ENABLED

  ConfigRuleVPCFlowLogsEnabled:
    Type: AWS::Config::ConfigRule
    DependsOn: ConfigRole
    Properties:
      ConfigRuleName: !Sub "${AWS::StackName}-vpc-flow-logs-enabled"
      Description: Checks whether VPC flow logs are enabled
      Scope:
        ComplianceResourceTypes:
          - AWS::EC2::VPC
      Source:
        Owner: AWS
        SourceIdentifier: VPC_FLOW_LOGS_ENABLED

  ConfigRuleGuardDutyEnabledCentralized:
    Type: AWS::Config::ConfigRule
    DependsOn: ConfigRole
    Properties:
      ConfigRuleName: !Sub "${AWS::StackName}-guardduty-enabled-centralized"
      Description: Checks whether GuardDuty is enabled
      Source:
        Owner: AWS
        SourceIdentifier: GUARDDUTY_ENABLED_CENTRALIZED

  ConfigRuleKMSKeyNotScheduledForDeletion:
    Type: AWS::Config::ConfigRule
    DependsOn: ConfigRole
    Properties:
      ConfigRuleName: !Sub "${AWS::StackName}-kms-cmk-not-scheduled-for-deletion"
      Description: Checks whether KMS customer managed keys are not scheduled for deletion
      Scope:
        ComplianceResourceTypes:
          - AWS::KMS::Key
      Source:
        Owner: AWS
        SourceIdentifier: KMS_CMK_NOT_SCHEDULED_FOR_DELETION

  ConfigRuleACMCertificateExpirationCheck:
    Type: AWS::Config::ConfigRule
    DependsOn: ConfigRole
    Properties:
      ConfigRuleName: !Sub "${AWS::StackName}-acm-certificate-expiration-check"
      Description: Checks whether ACM certificates are not expiring soon
      InputParameters:
        daysToExpiration: "30"
      Scope:
        ComplianceResourceTypes:
          - AWS::ACM::Certificate
      Source:
        Owner: AWS
        SourceIdentifier: ACM_CERTIFICATE_EXPIRATION_CHECK

  ConfigRuleEC2SecurityGroupAttachedToENI:
    Type: AWS::Config::ConfigRule
    DependsOn: ConfigRole
    Properties:
      ConfigRuleName: !Sub "${AWS::StackName}-ec2-security-group-attached-to-eni"
      Description: Checks whether EC2 security groups are attached to ENIs
      Scope:
        ComplianceResourceTypes:
          - AWS::EC2::SecurityGroup
      Source:
        Owner: AWS
        SourceIdentifier: EC2_SECURITY_GROUP_ATTACHED_TO_ENI

  ConfigRuleRestrictedSSH:
    Type: AWS::Config::ConfigRule
    DependsOn: ConfigRole
    Properties:
      ConfigRuleName: !Sub "${AWS::StackName}-restricted-ssh"
      Description: Checks whether security groups restrict SSH access
      Scope:
        ComplianceResourceTypes:
          - AWS::EC2::SecurityGroup
      Source:
        Owner: AWS
        SourceIdentifier: INCOMING_SSH_DISABLED

  ConfigRuleRestrictedCommonPorts:
    Type: AWS::Config::ConfigRule
    DependsOn: ConfigRole
    Properties:
      ConfigRuleName: !Sub "${AWS::StackName}-restricted-common-ports"
      Description: Checks whether security groups restrict common ports
      Scope:
        ComplianceResourceTypes:
          - AWS::EC2::SecurityGroup
      Source:
        Owner: AWS
        SourceIdentifier: RESTRICTED_INCOMING_TRAFFIC

  # 29. CloudWatch Alarms
  LambdaErrorRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-lambda-error-rate-alarm"
      AlarmDescription: Alarm when Lambda error rate exceeds 5%
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: FunctionName
          Value: !Ref EvidenceProcessor

  LambdaDurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-lambda-duration-alarm"
      AlarmDescription: Alarm when Lambda duration exceeds 25 seconds
      MetricName: Duration
      Namespace: AWS/Lambda
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 25000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: FunctionName
          Value: !Ref EvidenceProcessor

  LambdaThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-lambda-throttle-alarm"
      AlarmDescription: Alarm when Lambda throttles occur
      MetricName: Throttles
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: FunctionName
          Value: !Ref EvidenceProcessor

  DynamoDBReadThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-dynamodb-read-throttle-alarm"
      AlarmDescription: Alarm when DynamoDB read throttles occur
      MetricName: ReadThrottleEvents
      Namespace: AWS/DynamoDB
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: TableName
          Value: !Ref PendingEventsTable

  DynamoDBWriteThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-dynamodb-write-throttle-alarm"
      AlarmDescription: Alarm when DynamoDB write throttles occur
      MetricName: WriteThrottleEvents
      Namespace: AWS/DynamoDB
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: TableName
          Value: !Ref PendingEventsTable

  SNSPublishFailedAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: HasAlertEmail
    Properties:
      AlarmName: !Sub "${AWS::StackName}-sns-publish-failed-alarm"
      AlarmDescription: Alarm when SNS publish failures occur
      MetricName: NumberOfNotificationsFailed
      Namespace: AWS/SNS
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: TopicName
          Value: !GetAtt AlertTopic.TopicName

