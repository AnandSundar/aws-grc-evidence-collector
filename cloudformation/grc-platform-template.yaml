      Runtime: python3.11
      Handler: lambda_function.lambda_handler
      Role: !GetAtt ReportExporterRole.Arn
      Timeout: 900
      MemorySize: 1024
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          METADATA_TABLE: !Ref MetadataTable
          REMEDIATION_LOG_TABLE: !Ref RemediationLogTable
          SCORECARD_TABLE: !Ref ScorecardTable
          EVIDENCE_BUCKET: !Ref EvidenceBucket
          REPORTS_BUCKET: !Ref ReportsBucket
          KMS_KEY: !GetAtt KMSKey.Arn
          ALERT_TOPIC_ARN: !If [HasAlertEmail, !Ref AlertTopic, ""]
      Code:
        ZipFile: |
          import json
          import logging
          import os
          import boto3
          import csv
          import io
          from datetime import datetime, timedelta
          from dataclasses import dataclass, asdict
          
          logger = logging.getLogger(__name__)
          logger.setLevel(logging.INFO)
          
          dynamodb = boto3.client("dynamodb")
          s3 = boto3.client("s3")
          sns = boto3.client("sns")
          
          METADATA_TABLE = os.environ.get("METADATA_TABLE")
          REMEDIATION_LOG_TABLE = os.environ.get("REMEDIATION_LOG_TABLE")
          SCORECARD_TABLE = os.environ.get("SCORECARD_TABLE")
          EVIDENCE_BUCKET = os.environ.get("EVIDENCE_BUCKET")
          REPORTS_BUCKET = os.environ.get("REPORTS_BUCKET")
          ALERT_TOPIC_ARN = os.environ.get("ALERT_TOPIC_ARN")
          
          @dataclass
          class AuditReport:
              account_id: str
              report_period_start: str
              report_period_end: str
              generated_date: str
              classification: str
              overall_risk_score: float
              trend_data: list
              top_5_risks: list
              framework_coverage: list
              critical_high_findings: list
              evidence_collection_summary: dict
              auto_remediation_log: list
              appendix: dict
          
          def query_evidence_for_period(start_date: datetime, end_date: datetime) -> list:
              evidence_list = []
              try:
                  paginator = dynamodb.get_paginator("scan")
                  scan_params = {"TableName": METADATA_TABLE,
                  "FilterExpression": "#ts BETWEEN :start_date AND :end_date",
                  "ExpressionAttributeNames": {"#ts": "timestamp"},
                  "ExpressionAttributeValues": {":start_date": {"S": start_date.isoformat()},
                  ":end_date": {"S": end_date.isoformat()}}}
                  for page in paginator.paginate(**scan_params):
                      for item in page.get("Items", []):
                          evidence = {}
                          for key, value in item.items():
                              if "S" in value: evidence[key] = value["S"]
                              elif "N" in value: evidence[key] = float(value["N"])
                              elif "L" in value: evidence[key] = [v["S"] for v in value["L"]]
                              elif "M" in value: evidence[key] = json.loads(value["M"])
                          evidence_list.append(evidence)
                  logger.info(f"Queried {len(evidence_list)} evidence records for audit period")
              except Exception as e:
                  logger.error(f"Failed to query evidence: {e}")
              return evidence_list
          
          def generate_report_json(evidence_list: list, start_date: datetime, end_date: datetime) -> dict:
              priority_counts = {"CRITICAL": 0, "HIGH": 0, "MEDIUM": 0, "LOW": 0}
              for e in evidence_list:
                  p = e.get("priority", "LOW")
                  if p in priority_counts: priority_counts[p] += 1
              critical_high = [e for e in evidence_list if e.get("priority") in ["CRITICAL", "HIGH"]]
              report = {
                  "account_id": os.environ.get("AWS_ACCOUNT_ID", ""),
                  "report_period_start": start_date.isoformat(),
                  "report_period_end": end_date.isoformat(),
                  "generated_date": datetime.utcnow().isoformat(),
                  "classification": "CONFIDENTIAL",
                  "overall_risk_score": 75.0,
                  "trend_data": [],
                  "top_5_risks": critical_high[:5],
                  "framework_coverage": [],
                  "critical_high_findings": critical_high,
                  "evidence_collection_summary": {
                      "total_records": len(evidence_list),
                      "records_by_priority": priority_counts,
                      "sla_adherence_percent": 100.0,
                  },
                  "auto_remediation_log": [],
                  "appendix": {"evidence_count_by_day": {}},
              }
              return report
          
          def generate_report_csv(evidence_list: list) -> str:
              output = io.StringIO()
              fieldnames = ["date", "event_type", "priority", "compliance_tags", "finding_title"]
              writer = csv.DictWriter(output, fieldnames=fieldnames)
              writer.writeheader()
              for e in evidence_list:
                  created_at = e.get("timestamp", "")
                  date = created_at.split("T")[0] if created_at else "N/A"
                  writer.writerow({
                      "date": date,
                      "event_type": e.get("event_type", "unknown"),
                      "priority": e.get("priority", "LOW"),
                      "compliance_tags": json.dumps(e.get("compliance_tags", [])),
                      "finding_title": e.get("finding_title", "Unknown"),
                  })
              return output.getvalue()
          
          def lambda_handler(event, context):
              logger.info("Report Exporter Lambda invoked")
              end_date = datetime.utcnow()
              start_date = end_date - timedelta(days=7)
              evidence_list = query_evidence_for_period(start_date, end_date)
              report_json = generate_report_json(evidence_list, start_date, end_date)
              report_csv = generate_report_csv(evidence_list)
              date_str = end_date.strftime("%Y-%m-%d")
              json_key = f"reports/audit-report-{date_str}.json"
              csv_key = f"reports/audit-report-{date_str}.csv"
              try:
                  s3.put_object(Bucket=REPORTS_BUCKET, Key=json_key,
                  Body=json.dumps(report_json, indent=2), ContentType="application/json")
                  logger.info(f"JSON report stored to S3: s3://{REPORTS_BUCKET}/{json_key}")
              except Exception as e:
                  logger.error(f"Failed to store JSON report: {e}")
              try:
                  s3.put_object(Bucket=REPORTS_BUCKET, Key=csv_key,
                  Body=report_csv, ContentType="text/csv")
                  logger.info(f"CSV report stored to S3: s3://{REPORTS_BUCKET}/{csv_key}")
              except Exception as e:
                  logger.error(f"Failed to store CSV report: {e}")
              if ALERT_TOPIC_ARN:
                  subject = f"[GRC Report] Audit Report Generated - {date_str}"
                  message = f"Audit report for period {start_date.strftime('%Y-%m-%d')} to {end_date.strftime('%Y-%m-%d')} has been generated.\nTotal Evidence Records: {len(evidence_list)}"
                  try:
                      sns.publish(TopicArn=ALERT_TOPIC_ARN, Subject=subject, Message=message)
                  except Exception as e:
                      logger.error(f"Failed to send SNS notification: {e}")
              return {"statusCode": 200, "report_date": date_str, "evidence_count": len(evidence_list)}
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-report-exporter"
        - Key: Environment
          Value: !Ref Environment

  # ============================================================================
