                "trigger": "<rule>",
                "resource_type": "s3_bucket",
                "finding_id": "<rule>-<bucket>",
                "finding_title": "S3 Bucket Public Write Access Detected",
                "finding_priority": "CRITICAL",
                "finding_description": "S3 bucket <bucket> has public write access - automatically blocking public access",
                "parameters": {}
              }

