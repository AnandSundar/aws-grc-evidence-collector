  # ============================================================================
  # PART 9: OUTPUTS
  # ============================================================================

Outputs:
  EvidenceBucketName:
    Description: Name of the Evidence S3 bucket
    Value: !Ref EvidenceBucket
    Export:
      Name: !Sub "${AWS::StackName}-EvidenceBucketName"

  EvidenceBucketArn:
    Description: ARN of the Evidence S3 bucket
    Value: !GetAtt EvidenceBucket.Arn
    Export:
      Name: !Sub "${AWS::StackName}-EvidenceBucketArn"

  CloudTrailBucketName:
    Description: Name of the CloudTrail S3 bucket
    Value: !Ref CloudTrailBucket
    Export:
      Name: !Sub "${AWS::StackName}-CloudTrailBucketName"

  ReportsBucketName:
    Description: Name of the Reports S3 bucket
    Value: !Ref ReportsBucket
    Export:
      Name: !Sub "${AWS::StackName}-ReportsBucketName"

  ConfigBucketName:
    Description: Name of the AWS Config S3 bucket
    Value: !Ref ConfigBucket
    Export:
      Name: !Sub "${AWS::StackName}-ConfigBucketName"

  DeploymentBucket:
    Description: Name of the Lambda deployment packages S3 bucket
    Value: !Ref DeploymentBucket
    Export:
      Name: !Sub "${AWS::StackName}-DeploymentBucket"

  ConfigBucketArn:
    Description: ARN of the AWS Config S3 bucket
    Value: !GetAtt ConfigBucket.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ConfigBucketArn"

  ConfigRoleArn:
    Description: ARN of the AWS Config IAM Role
    Value: !GetAtt ConfigRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ConfigRoleArn"

  MetadataTableName:
    Description: Name of the Metadata DynamoDB table
    Value: !Ref MetadataTable
    Export:
      Name: !Sub "${AWS::StackName}-MetadataTableName"

  MetadataTableArn:
    Description: ARN of the Metadata DynamoDB table
    Value: !GetAtt MetadataTable.Arn
    Export:
      Name: !Sub "${AWS::StackName}-MetadataTableArn"

  RemediationLogTableName:
    Description: Name of the Remediation Log DynamoDB table
    Value: !Ref RemediationLogTable
    Export:
      Name: !Sub "${AWS::StackName}-RemediationLogTableName"

  ScorecardTableName:
    Description: Name of the Scorecard DynamoDB table
    Value: !Ref ScorecardTable
    Export:
      Name: !Sub "${AWS::StackName}-ScorecardTableName"

  PendingEventsTableName:
    Description: Name of the Pending Events DynamoDB table
    Value: !Ref PendingEventsTable
    Export:
      Name: !Sub "${AWS::StackName}-PendingEventsTableName"

  AlertTopicArn:
    Description: ARN of the Alert SNS topic
    Value: !Ref AlertTopic
    Export:
      Name: !Sub "${AWS::StackName}-AlertTopicArn"

  KMSKeyId:
    Description: ID of the KMS encryption key
    Value: !Ref KMSKey
    Export:
      Name: !Sub "${AWS::StackName}-KMSKeyId"

  KMSKeyArn:
    Description: ARN of the KMS encryption key
    Value: !GetAtt KMSKey.Arn
    Export:
      Name: !Sub "${AWS::StackName}-KMSKeyArn"

  EvidenceProcessorArn:
    Description: ARN of the Evidence Processor Lambda function
    Value: !GetAtt EvidenceProcessor.Arn
    Export:
      Name: !Sub "${AWS::StackName}-EvidenceProcessorArn"

  RemediationEngineArn:
    Description: ARN of the Remediation Engine Lambda function
    Value: !GetAtt RemediationEngine.Arn
    Export:
      Name: !Sub "${AWS::StackName}-RemediationEngineArn"

  ScorecardGeneratorArn:
    Description: ARN of the Scorecard Generator Lambda function
    Value: !GetAtt ScorecardGenerator.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ScorecardGeneratorArn"

  AgingMonitorArn:
    Description: ARN of the Aging Monitor Lambda function
    Value: !GetAtt AgingMonitor.Arn
    Export:
      Name: !Sub "${AWS::StackName}-AgingMonitorArn"

  ReportExporterArn:
    Description: ARN of the Report Exporter Lambda function
    Value: !GetAtt ReportExporter.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ReportExporterArn"

  CloudTrailArn:
    Description: ARN of the CloudTrail
    Value: !GetAtt ComplianceTrail.Arn
    Export:
      Name: !Sub "${AWS::StackName}-CloudTrailArn"

  DashboardUrl:
    Description: URL of the CloudWatch Dashboard
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${AWS::StackName}-grc-dashboard"
    Export:
      Name: !Sub "${AWS::StackName}-DashboardUrl"

  StackDeployedAt:
    Description: Timestamp when the stack was deployed
    Value: !Sub "${AWS::StackName}-deployed-at-${AWS::Region}"

  EvidenceProcessorRoleArn:
    Description: ARN of the Evidence Processor IAM role
    Value: !GetAtt EvidenceProcessorRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-EvidenceProcessorRoleArn"

  RemediationEngineRoleArn:
    Description: ARN of the Remediation Engine IAM role
    Value: !GetAtt RemediationEngineRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-RemediationEngineRoleArn"

  ScorecardGeneratorRoleArn:
    Description: ARN of the Scorecard Generator IAM role
    Value: !GetAtt ScorecardGeneratorRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ScorecardGeneratorRoleArn"

  AgingMonitorRoleArn:
    Description: ARN of the Aging Monitor IAM role
    Value: !GetAtt AgingMonitorRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-AgingMonitorRoleArn"

  ReportExporterRoleArn:
    Description: ARN of the Report Exporter IAM role
    Value: !GetAtt ReportExporterRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ReportExporterRoleArn"

