                "resource_id": "<user>",
                "trigger": "<rule>",
                "resource_type": "aws.iam.user",
                "finding_id": "<rule>-<user>",
                "finding_title": "IAM User MFA Not Enabled",
                "finding_priority": "HIGH",
                "finding_description": "IAM user <user> does not have MFA enabled - sending notification to admin team",
                "parameters": {}
              }

  # 30. Lambda Permissions for EventBridge Remediation Rules
  RemediationEngineEventBridgePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RemediationEngine
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/*"

  # ============================================================================
  # PART 8: CLOUDTRAIL, CONFIG, CLOUDWATCH
  # ============================================================================

  # 24. CloudTrail
  ComplianceTrail:
    Type: AWS::CloudTrail::Trail
    DependsOn: CloudTrailBucketPolicy
    Properties:
      TrailName: !Sub "${AWS::StackName}-compliance-trail"
      S3BucketName: !Ref CloudTrailBucket
      IncludeGlobalServiceEvents: true
      IsMultiRegionTrail: true
      EnableLogFileValidation: true
      IsLogging: true
      KMSKeyId: !GetAtt KMSKey.Arn
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-compliance-trail"
        - Key: Environment
          Value: !Ref Environment

  # 31. AWS Config Role
  ConfigRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWS_ConfigRole'
      Policies:
        - PolicyName: ConfigS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:PutObject'
                  - 's3:GetBucketAcl'
                Resource: !Sub "${ConfigBucket.Arn}/*"
              - Effect: Allow
                Action: 's3:GetBucketAcl'
                Resource: !GetAtt ConfigBucket.Arn

  # 33-52. AWS Config Rules (20 managed rules)
  ConfigRuleS3PublicReadProhibited:
    Type: AWS::Config::ConfigRule
    DependsOn: ConfigRole
    Properties:
      ConfigRuleName: !Sub "${AWS::StackName}-s3-bucket-public-read-prohibited"
      Description: Checks that Amazon S3 buckets are not publicly readable
      Scope:
        ComplianceResourceTypes:
          - AWS::S3::Bucket
      Source:
        Owner: AWS
        SourceIdentifier: S3_BUCKET_PUBLIC_READ_PROHIBITED

