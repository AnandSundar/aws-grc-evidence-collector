  # 17. Scorecard Generator Lambda
  ScorecardGenerator:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-scorecard-generator-${Environment}"
      Description: Generates daily compliance scorecards
      Runtime: python3.11
      Handler: lambda_function.lambda_handler
      Role: !GetAtt ScorecardGeneratorRole.Arn
      Timeout: 300
      MemorySize: 512
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          METADATA_TABLE: !Ref MetadataTable
          REMEDIATION_LOG_TABLE: !Ref RemediationLogTable
          SCORECARD_TABLE: !Ref ScorecardTable
          EVIDENCE_BUCKET: !Ref EvidenceBucket
          REPORTS_BUCKET: !Ref ReportsBucket
          SCORECARD_BUCKET: !Ref ReportsBucket
          KMS_KEY: !GetAtt KMSKey.Arn
          ALERT_TOPIC_ARN: !Ref AlertTopic
          SCORECARD_SNS_TOPIC: !Ref AlertTopic
          EVIDENCE_DYNAMODB_TABLE: !Ref MetadataTable
          SCORECARD_DYNAMODB_TABLE: !Ref ScorecardTable
          REMEDIATION_DYNAMODB_TABLE: !Ref RemediationLogTable
          EVIDENCE_TIMESTAMP_GSI: "created_at-index"
          ALERT_SNS_TOPIC: !Ref AlertTopic
      Code:
        ZipFile: |
          import json
          import logging
          import os
          import boto3
          from datetime import datetime, timedelta
          from dataclasses import dataclass, asdict

          logger = logging.getLogger(__name__)
          logger.setLevel(logging.INFO)
          
          dynamodb = boto3.client("dynamodb")
          s3 = boto3.client("s3")
          sns = boto3.client("sns")
          
          METADATA_TABLE = os.environ.get("METADATA_TABLE")
          REMEDIATION_LOG_TABLE = os.environ.get("REMEDIATION_LOG_TABLE")
          SCORECARD_TABLE = os.environ.get("SCORECARD_TABLE")
          EVIDENCE_BUCKET = os.environ.get("EVIDENCE_BUCKET")
          REPORTS_BUCKET = os.environ.get("REPORTS_BUCKET")
          ALERT_TOPIC_ARN = os.environ.get("ALERT_TOPIC_ARN")
          
          @dataclass
          class FrameworkScore:
              framework_name: str
              total_tested: int
              passing: int
              failing: int
              score: float
              trend: str = None
          
          @dataclass
          class ComplianceScorecard:
              scorecard_date: str
              generated_at: str
              account_id: str
              overall_score: float
              overall_trend: str
              framework_scores: list
              total_evidence_count: int
              critical_count: int
              high_count: int
              medium_count: int
              low_count: int
              top_5_risks: list
              evidence_by_collector: dict
              remediation_summary: dict
              sla_adherence: float
          
          def query_evidence_last_24h() -> list:
              evidence_list = []
              try:
                  end_time = datetime.utcnow()
                  start_time = end_time - timedelta(hours=24)
                  paginator = dynamodb.get_paginator("scan")
                  scan_params = {"TableName": METADATA_TABLE, "FilterExpression": "#ts BETWEEN :start_time AND :end_time",
                  "ExpressionAttributeNames": {"#ts": "timestamp"},
                  "ExpressionAttributeValues": {":start_time": {"S": start_time.isoformat()},
                  ":end_time": {"S": end_time.isoformat()}}}
                  for page in paginator.paginate(**scan_params):
                      for item in page.get("Items", []):
                          evidence = {}
                          for key, value in item.items():
                              if "S" in value: evidence[key] = value["S"]
                              elif "N" in value: evidence[key] = float(value["N"])
                              elif "L" in value: evidence[key] = [v["S"] for v in value["L"]]
                              elif "M" in value: evidence[key] = json.loads(value["M"])
                          evidence_list.append(evidence)
                  logger.info(f"Queried {len(evidence_list)} evidence records from last 24h")
              except Exception as e:
                  logger.error(f"Failed to query evidence: {e}")
              return evidence_list
          
          def calculate_framework_scores(evidence_list: list) -> list:
              framework_data = {}
              for evidence in evidence_list:
                  compliance_tags = evidence.get("compliance_tags", [])
                  if isinstance(compliance_tags, str):
                      try: compliance_tags = json.loads(compliance_tags)
                      except: compliance_tags = [compliance_tags]
                  control_status = evidence.get("priority", "UNKNOWN")
                  for framework in compliance_tags:
                      if framework not in framework_data:
                          framework_data[framework] = {"total_tested": 0, "passing": 0, "failing": 0}
                      framework_data[framework]["total_tested"] += 1
                      if control_status == "LOW": framework_data[framework]["passing"] += 1
                      else: framework_data[framework]["failing"] += 1
              framework_scores = []
              for framework_name, data in framework_data.items():
                  score = (data["passing"] / data["total_tested"] * 100) if data["total_tested"] > 0 else 0.0
                  framework_scores.append(FrameworkScore(framework_name=framework_name,
                  total_tested=data["total_tested"], passing=data["passing"],
                  failing=data["failing"], score=round(score, 2)))
              return framework_scores
          
          def lambda_handler(event, context):
              logger.info("Scorecard Generator Lambda invoked")
              evidence_list = query_evidence_last_24h()
              framework_scores = calculate_framework_scores(evidence_list)
              overall_score = sum(fs.score for fs in framework_scores) / len(framework_scores) if framework_scores else 0.0
              priority_counts = {"CRITICAL": 0, "HIGH": 0, "MEDIUM": 0, "LOW": 0}
              for e in evidence_list:
                  p = e.get("priority", "LOW")
                  if p in priority_counts: priority_counts[p] += 1
              collector_counts = {}
              for e in evidence_list:
                  c = e.get("event_type", "unknown")
                  collector_counts[c] = collector_counts.get(c, 0) + 1
              scorecard = ComplianceScorecard(
                  scorecard_date=datetime.utcnow().strftime("%Y-%m-%d"),
                  generated_at=datetime.utcnow().isoformat(),
                  account_id=os.environ.get("AWS_ACCOUNT_ID", ""),
                  overall_score=round(overall_score, 2),
                  overall_trend="STABLE",
                  framework_scores=[asdict(fs) for fs in framework_scores],
                  total_evidence_count=len(evidence_list),
                  critical_count=priority_counts["CRITICAL"],
                  high_count=priority_counts["HIGH"],
                  medium_count=priority_counts["MEDIUM"],
                  low_count=priority_counts["LOW"],
                  top_5_risks=[],
                  evidence_by_collector=collector_counts,
                  remediation_summary={"total": 0, "successful": 0, "failed": 0},
                  sla_adherence=100.0,
              )
              s3_key = f"scorecards/{scorecard.scorecard_date}/scorecard.json"
              try:
                  s3.put_object(Bucket=REPORTS_BUCKET, Key=s3_key,
                  Body=json.dumps(asdict(scorecard), indent=2), ContentType="application/json",
                  ServerSideEncryption="aws:kms", SSEKeyId=KMS_KEY)
                  logger.info(f"Scorecard stored to S3: s3://{REPORTS_BUCKET}/{s3_key}")
              except Exception as e:
                  logger.error(f"Failed to store scorecard: {e}")
              if ALERT_TOPIC_ARN:
                  subject = f"[GRC Daily Digest] Compliance Scorecard - {scorecard.scorecard_date}"
                  message = f"Overall Score: {scorecard.overall_score}%\nTotal Evidence: {scorecard.total_evidence_count}\nCritical: {scorecard.critical_count}\nHigh: {scorecard.high_count}"
                  try:
                      sns.publish(TopicArn=ALERT_TOPIC_ARN, Subject=subject, Message=message)
                  except Exception as e:
                      logger.error(f"Failed to send SNS notification: {e}")
              return {"statusCode": 200, "scorecard_date": scorecard.scorecard_date, "overall_score": scorecard.overall_score}
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-scorecard-generator"
        - Key: Environment
          Value: !Ref Environment

  # 18. Aging Monitor Lambda
  AgingMonitor:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-aging-monitor-${Environment}"
      Description: Monitors evidence collection SLAs and alerts on stale evidence
      Runtime: python3.11
      Handler: lambda_function.lambda_handler
      Role: !GetAtt AgingMonitorRole.Arn
      Timeout: 300
      MemorySize: 512
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          METADATA_TABLE: !Ref MetadataTable
          ALERT_TOPIC_ARN: !If [HasAlertEmail, !Ref AlertTopic, ""]
      Code:
        ZipFile: |
          import json
          import logging
          import os
          import boto3
          from datetime import datetime, timedelta
          
          logger = logging.getLogger(__name__)
          logger.setLevel(logging.INFO)
          
          dynamodb = boto3.client("dynamodb")
          sns = boto3.client("sns")
          
          METADATA_TABLE = os.environ.get("METADATA_TABLE")
          ALERT_TOPIC_ARN = os.environ.get("ALERT_TOPIC_ARN")
          
          EVIDENCE_COLLECTION_SLA = {
              "cloudtrail-processor": {"max_age_hours": 1, "description": "CloudTrail events"},
              "guardduty-collector": {"max_age_hours": 1, "description": "GuardDuty findings"},
              "securityhub-collector": {"max_age_hours": 1, "description": "Security Hub findings"},
              "iam-collector": {"max_age_hours": 4, "description": "IAM configuration"},
              "s3-collector": {"max_age_hours": 4, "description": "S3 bucket configuration"},
              "config-collector": {"max_age_hours": 6, "description": "AWS Config rules"},
          }
          
          def get_most_recent_evidence() -> dict:
              try:
                  response = dynamodb.scan(TableName=METADATA_TABLE, Limit=1)
                  items = response.get("Items", [])
                  if items:
                      item = items[0]
                      evidence = {}
                      for key, value in item.items():
                          if "S" in value: evidence[key] = value["S"]
                          elif "N" in value: evidence[key] = float(value["N"])
                      return evidence
              except Exception as e:
                  logger.error(f"Failed to query most recent evidence: {e}")
              return None
          
          def calculate_evidence_age(evidence: dict) -> float:
              try:
                  created_at_str = evidence.get("timestamp", "")
                  if not created_at_str: return float("inf")
                  created_at = datetime.fromisoformat(created_at_str.replace("Z", "+00:00"))
                  now = datetime.utcnow()
                  return (now - created_at).total_seconds() / 3600
              except Exception as e:
                  logger.warning(f"Could not calculate evidence age: {e}")
                  return float("inf")
          
          def send_stale_evidence_alert(collector_name: str, age_hours: float, sla_hours: int) -> None:
              if not ALERT_TOPIC_ARN: return
              subject = f"[HIGH] Stale Evidence Alert: {collector_name}"
              message = f"""GRC Platform - Stale Evidence Alert
              Collector: {collector_name}
              Current Age: {age_hours:.1f} hours
              SLA Threshold: {sla_hours} hours
              SLA Violation: {age_hours - sla_hours:.1f} hours overdue
              This alert requires immediate attention."""
              try:
                  sns.publish(TopicArn=ALERT_TOPIC_ARN, Subject=subject, Message=message)
                  logger.info(f"SNS alert sent for stale evidence: {collector_name}")
              except Exception as e:
                  logger.error(f"Failed to send SNS alert: {e}")
          
          def lambda_handler(event, context):
              logger.info("Evidence Aging Monitor Lambda invoked")
              last_evidence = get_most_recent_evidence()
              if last_evidence:
                  age_hours = calculate_evidence_age(last_evidence)
                  logger.info(f"Most recent evidence is {age_hours:.1f} hours old")
                  for collector_name, sla_info in EVIDENCE_COLLECTION_SLA.items():
                      max_age_hours = sla_info["max_age_hours"]
                      if age_hours > max_age_hours:
                          logger.warning(f"STALE EVIDENCE DETECTED! ({age_hours:.1f}h > {max_age_hours}h)")
                          send_stale_evidence_alert(collector_name, age_hours, max_age_hours)
              else:
                  logger.warning("No evidence found in metadata table")
              return {"statusCode": 200, "message": "Aging check completed"}
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-aging-monitor"
        - Key: Environment
          Value: !Ref Environment

