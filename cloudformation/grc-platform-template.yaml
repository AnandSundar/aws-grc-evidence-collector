  # 15. Evidence Processor Lambda
  EvidenceProcessor:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-evidence-processor-${Environment}"
      Description: Processes CloudTrail events and stores evidence
      Runtime: python3.11
      Handler: lambda_function.lambda_handler
      Role: !GetAtt EvidenceProcessorRole.Arn
      Timeout: 60
      MemorySize: 512
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          EVIDENCE_BUCKET: !Ref EvidenceBucket
          METADATA_TABLE: !Ref MetadataTable
          PENDING_EVENTS_TABLE: !Ref PendingEventsTable
          ALERT_TOPIC_ARN: !If [HasAlertEmail, !Ref AlertTopic, ""]
          ENABLE_AI: !Ref EnableAIAnalysis
          USE_BATCHING: "true"
          ENABLE_MEDIUM_ALERTS: "true"
          ENABLE_LOW_ALERTS: "true"
      Code:
        ZipFile: |
          import json
          import uuid
          import os
          import logging
          from datetime import datetime
          import boto3
          
          logger = logging.getLogger(__name__)
          logger.setLevel(logging.INFO)
          
          s3 = boto3.client("s3")
          dynamodb = boto3.client("dynamodb")
          sns = boto3.client("sns")
          
          EVIDENCE_BUCKET = os.environ.get("EVIDENCE_BUCKET")
          METADATA_TABLE = os.environ.get("METADATA_TABLE")
          ALERT_TOPIC_ARN = os.environ.get("ALERT_TOPIC_ARN")
          PENDING_EVENTS_TABLE = os.environ.get("PENDING_EVENTS_TABLE")
          ENABLE_AI = os.environ.get("ENABLE_AI", "false").lower() == "true"
          
          if ENABLE_AI:
              bedrock = boto3.client("bedrock-runtime", region_name=os.environ.get("AWS_REGION", "us-east-1"))
          
          HIGH_PRIORITY_EVENTS = {
              "CreateUser", "DeleteUser", "AttachUserPolicy", "DetachUserPolicy",
              "CreateRole", "DeleteRole", "AttachRolePolicy", "PutRolePolicy",
              "CreateAccessKey", "DeleteAccessKey", "UpdateAccessKey",
              "CreateSecurityGroup", "DeleteSecurityGroup", "AuthorizeSecurityGroupIngress",
              "AuthorizeSecurityGroupEgress", "RevokeSecurityGroupIngress",
              "PutBucketPolicy", "DeleteBucketPolicy", "PutBucketAcl",
              "PutBucketEncryption", "DeleteBucketEncryption",
              "CreateKey", "DisableKey", "ScheduleKeyDeletion",
          }
          
          MEDIUM_PRIORITY_EVENTS = {
              "StartInstances", "StopInstances", "TerminateInstances", "RunInstances",
              "CreateTag", "DeleteTag", "CreateSnapshot", "DeleteSnapshot",
              "ModifyInstanceAttribute", "ModifyNetworkInterfaceAttribute",
          }
          
          def get_priority(event_name: str, user_identity: dict) -> str:
              if event_name in HIGH_PRIORITY_EVENTS:
                  return "HIGH"
              if event_name == "ConsoleLogin" and user_identity.get("type") == "Root":
                  return "HIGH"
              if event_name in MEDIUM_PRIORITY_EVENTS:
                  return "MEDIUM"
              return "LOW"
          
          def derive_compliance_tags(event_name: str) -> list:
              if any(x in event_name for x in ["User", "Role", "Policy", "AccessKey", "Login"]):
                  return ["PCI-DSS-8.3", "SOC2-CC6.1", "NIST-AC-2", "ISO27001-A.9"]
              if any(x in event_name for x in ["Bucket"]):
                  return ["PCI-DSS-3.4", "SOC2-CC6.7"]
              if any(x in event_name for x in ["SecurityGroup", "Network"]):
                  return ["PCI-DSS-1.3", "SOC2-CC6.6"]
              if any(x in event_name for x in ["Instance", "Snapshot", "Tag"]):
                  return ["PCI-DSS-6.4", "SOC2-CC7.1", "NIST-CM-3"]
              return ["SOC2-CC6.8"]
          
          def analyze_with_bedrock(event: dict, initial_priority: str) -> dict:
              if initial_priority == "LOW":
                  return {"ai_analyzed": False, "reason": "LOW priority - skipped for cost"}
              if not ENABLE_AI:
                  return {"ai_analyzed": False, "reason": "AI analysis disabled"}
              try:
                  prompt = f"""Analyze this AWS CloudTrail event and provide a structured risk assessment.
                   CloudTrail Event: {json.dumps(event, indent=2, default=str)}
                   Respond with ONLY valid JSON in this exact format:
                   {{"risk_level": "LOW|MEDIUM|HIGH|CRITICAL", "risk_score": 5, "summary": "<one sentence description>",
                   "compliance_impact": ["<framework>: <control>"], "anomaly_indicators": ["<indicator>"],
                   "recommended_action": "<specific action to take>", "false_positive_likelihood": "LOW|MEDIUM|HIGH",
                   "investigation_priority": "IMMEDIATE|SAME_DAY|WEEKLY|MONITOR"}}"""
                   response = bedrock.invoke_model(
                       modelId="nvidia.nemotron-nano-12b-v2",
                       contentType="application/json", accept="application/json",
                       body=json.dumps({"prompt": prompt, "max_gen_len": 600,
                       "temperature": 0.1, "top_p": 0.9}))
                   result = json.loads(response["body"].read())
                   ai_analysis = json.loads(result["results"][0]["sequence"])
                   ai_analysis["ai_analyzed"] = True
                   ai_analysis["model"] = "nvidia.nemotron-nano-12b-v2"
                  ai_analysis["analyzed_at"] = datetime.utcnow().isoformat()
                  return ai_analysis
              except Exception as e:
                  logger.warning(f"Bedrock analysis failed: {str(e)}")
                  return {"ai_analyzed": False, "reason": f"Error: {str(e)}"}
          
          def lambda_handler(event, context):
              try:
                  detail = event.get("detail", event)
                  event_name = detail.get("eventName", "Unknown")
                  user_identity = detail.get("userIdentity", {})
                  priority = get_priority(event_name, user_identity)
                  evidence_id = str(uuid.uuid4())
                  now = datetime.utcnow()
                  evidence = {
                      "evidence_id": evidence_id, "collected_at": now.isoformat(),
                      "event_id": detail.get("eventID"), "event_name": event_name,
                      "event_source": detail.get("eventSource"), "event_time": detail.get("eventTime"),
                      "user_identity": user_identity, "source_ip": detail.get("sourceIPAddress"),
                      "aws_region": detail.get("awsRegion"), "request_parameters": detail.get("requestParameters", {}),
                      "response_elements": detail.get("responseElements", {}), "priority": priority,
                      "compliance_tags": derive_compliance_tags(event_name), "raw_event": detail,
                  }
                  ai_analysis = analyze_with_bedrock(detail, priority)
                  evidence["ai_analysis"] = ai_analysis
                  s3_key = f"evidence/{now.year}/{now.month:02d}/{now.day:02d}/{evidence_id}.json"
                  if EVIDENCE_BUCKET:
                      s3.put_object(Bucket=EVIDENCE_BUCKET, Key=s3_key,
                      Body=json.dumps(evidence, default=str), ContentType="application/json")
                  ttl = int(now.timestamp()) + (90 * 24 * 60 * 60)
                  if METADATA_TABLE:
                      dynamodb.put_item(TableName=METADATA_TABLE, Item={
                          "evidence_id": {"S": evidence_id}, "timestamp": {"S": now.isoformat()},
                          "event_type": {"S": event_name}, "priority": {"S": priority},
                          "s3_key": {"S": s3_key}, "ttl": {"N": str(ttl)},
                      })
                  if PENDING_EVENTS_TABLE and priority in ["MEDIUM", "LOW"]:
                      try:
                          batch_interval = 15 if priority == "MEDIUM" else 60
                          expiry_time = int(now.timestamp()) + (batch_interval * 2 * 60)
                          dynamodb.put_item(TableName=PENDING_EVENTS_TABLE, Item={
                              "event_id": {"S": evidence_id}, "timestamp": {"S": now.isoformat()},
                              "priority": {"S": priority}, "processed": {"BOOL": False},
                              "event_name": {"S": event_name}, "event_time": {"S": detail.get("eventTime", "")},
                              "user_identity": {"S": json.dumps(user_identity, default=str)},
                              "source_ip": {"S": detail.get("sourceIPAddress", "")},
                              "aws_region": {"S": detail.get("awsRegion", "")},
                              "compliance_tags": {"SS": derive_compliance_tags(event_name)},
                              "evidence_id": {"S": evidence_id}, "s3_key": {"S": s3_key},
                              "expiry_time": {"N": str(expiry_time)},
                              "ai_analysis": {"S": json.dumps(ai_analysis, default=str)},
                          })
                      except Exception as e:
                          logger.error(f"Error storing event in pending events table: {str(e)}")
                  if priority == "HIGH" and ALERT_TOPIC_ARN:
                      alert_msg = evidence
                      if ai_analysis.get("ai_analyzed"):
                          alert_msg = {"Alert": f"HIGH Priority Event: {event_name}",
                          "AI_Summary": ai_analysis.get("summary"),
                          "Recommended_Action": ai_analysis.get("recommended_action"),
                          "Risk_Level": ai_analysis.get("risk_level"),
                          "Evidence_ID": evidence_id, "S3_Key": s3_key}
                      sns.publish(TopicArn=ALERT_TOPIC_ARN,
                      Subject=f"HIGH Priority GRC Alert: {event_name}",
                      Message=json.dumps(alert_msg, indent=2, default=str))
                  return {"statusCode": 200, "evidence_id": evidence_id, "priority": priority,
                  "s3_key": s3_key, "ai_analyzed": ai_analysis.get("ai_analyzed", False)}
              except Exception as e:
                  logger.error(f"Error processing event: {str(e)}")
                  raise
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-evidence-processor"
        - Key: Environment
          Value: !Ref Environment

